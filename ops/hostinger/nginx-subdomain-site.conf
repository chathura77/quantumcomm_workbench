# Full Nginx site for a true subdomain deployment.
# Build the app with:
#   QUANTUMCOMM_BASE_PATH=
#   NEXT_PUBLIC_SITE_URL=https://quantum-workbench.sarathchandra.com
#
# Copy to:
#   /etc/nginx/sites-available/quantumcomm-workbench
# Then symlink into sites-enabled and run certbot for TLS.

server {
    listen 80;
    listen [::]:80;
    server_name quantum-workbench.sarathchandra.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 1m;
    }
}
